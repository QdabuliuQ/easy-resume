# Cloudflare Workers + D1（青松简历「数据层」）
# 与主站隔离：浏览器只访问 resume.qdabuliuq.cn (Next)
# 本 Worker 仅由 Next 服务端通过 CF_API_BASE_URL 调用
# 禁止 Cloudflare Route：resume.qdabuliuq.cn/api/* → 本 Worker
name = "easy-resume-db"
main = "src/index.js"
compatibility_date = "2024-11-01"
workers_dev = true

# 本地：npx wrangler dev --local --port 8787
# 线上：npx wrangler deploy（可在开发机执行）

[[d1_databases]]
binding = "DB"
database_name = "easy-resume"
database_id = "4e2964ea-ac8c-4bb7-b7b2-a79859bc06ce"

# 密钥用 wrangler secret put（CF_API_SECRET / ADMIN_SECRET），勿写进本文件
[vars]
FRONTEND_URL = "https://resume.qdabuliuq.cn"
